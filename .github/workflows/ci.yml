name: CI

on:
  push:
    branches: [main, v3, "refactor/**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system libs for Qt/OpenCV (headless)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libegl1 libxkbcommon0 libdbus-1-3

      - name: Install PyTorch (CPU) for CI
        # The GPU build is installed separately in dev (see requirements.txt header).
        # CI only needs CPU torch so the inference modules import.
        run: pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint (advisory)
        continue-on-error: true
        run: ruff check .

      - name: Regression + import-smoke suite
        run: pytest -q
