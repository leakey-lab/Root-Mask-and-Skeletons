<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="rulerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C4DFF" stop-opacity="1" />
      <stop offset="100%" stop-color="#536DFE" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4CAF50" stop-opacity="1" />
      <stop offset="100%" stop-color="#8BC34A" stop-opacity="1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Ruler body -->
  <rect x="30" y="60" width="196" height="50" rx="6" ry="6" 
        fill="url(#rulerGradient)" stroke="#9575CD" stroke-width="2"/>
  
  <!-- Ruler tick marks -->
  <g stroke="#E0E0E0" stroke-width="2">
    <!-- Major ticks -->
    <line x1="50" y1="60" x2="50" y2="85"/>
    <line x1="90" y1="60" x2="90" y2="85"/>
    <line x1="130" y1="60" x2="130" y2="85"/>
    <line x1="170" y1="60" x2="170" y2="85"/>
    <line x1="210" y1="60" x2="210" y2="85"/>
    <!-- Minor ticks -->
    <line x1="70" y1="60" x2="70" y2="75"/>
    <line x1="110" y1="60" x2="110" y2="75"/>
    <line x1="150" y1="60" x2="150" y2="75"/>
    <line x1="190" y1="60" x2="190" y2="75"/>
  </g>
  
  <!-- LENGTH indicator - Horizontal line with endpoints -->
  <g filter="url(#glow)">
    <!-- Main measurement line -->
    <line x1="45" y1="160" x2="211" y2="160" 
          stroke="url(#lineGradient)" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Left endpoint marker -->
    <line x1="45" y1="145" x2="45" y2="175" 
          stroke="#4CAF50" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Right endpoint marker -->
    <line x1="211" y1="145" x2="211" y2="175" 
          stroke="#8BC34A" stroke-width="4" stroke-linecap="round"/>
    
    <!-- Measurement arrows -->
    <polygon points="55,160 70,153 70,167" fill="#4CAF50"/>
    <polygon points="201,160 186,153 186,167" fill="#8BC34A"/>
  </g>
  
  <!-- Distance indicator dots -->
  <circle cx="90" cy="200" r="5" fill="#81C784"/>
  <circle cx="128" cy="200" r="5" fill="#66BB6A"/>
  <circle cx="166" cy="200" r="5" fill="#81C784"/>
</svg>
