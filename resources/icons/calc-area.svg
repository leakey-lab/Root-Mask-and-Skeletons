<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="rulerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C4DFF" stop-opacity="1" />
      <stop offset="100%" stop-color="#536DFE" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="areaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4CAF50" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#8BC34A" stop-opacity="0.8" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Ruler body -->
  <rect x="30" y="60" width="196" height="50" rx="6" ry="6" 
        fill="url(#rulerGradient)" stroke="#9575CD" stroke-width="2"/>
  
  <!-- Ruler tick marks -->
  <g stroke="#E0E0E0" stroke-width="2">
    <!-- Major ticks -->
    <line x1="50" y1="60" x2="50" y2="85"/>
    <line x1="90" y1="60" x2="90" y2="85"/>
    <line x1="130" y1="60" x2="130" y2="85"/>
    <line x1="170" y1="60" x2="170" y2="85"/>
    <line x1="210" y1="60" x2="210" y2="85"/>
    <!-- Minor ticks -->
    <line x1="70" y1="60" x2="70" y2="75"/>
    <line x1="110" y1="60" x2="110" y2="75"/>
    <line x1="150" y1="60" x2="150" y2="75"/>
    <line x1="190" y1="60" x2="190" y2="75"/>
  </g>
  
  <!-- AREA indicator - Filled square with grid -->
  <g filter="url(#glow)">
    <!-- Main square area -->
    <rect x="68" y="135" width="120" height="90" rx="4" ry="4"
          fill="url(#areaGradient)" stroke="#4CAF50" stroke-width="3"/>
    
    <!-- Grid lines inside square -->
    <g stroke="#2E7D32" stroke-width="1" opacity="0.5">
      <line x1="108" y1="135" x2="108" y2="225"/>
      <line x1="148" y1="135" x2="148" y2="225"/>
      <line x1="68" y1="165" x2="188" y2="165"/>
      <line x1="68" y1="195" x2="188" y2="195"/>
    </g>
    
    <!-- Corner markers -->
    <circle cx="68" cy="135" r="5" fill="#8BC34A"/>
    <circle cx="188" cy="135" r="5" fill="#8BC34A"/>
    <circle cx="68" cy="225" r="5" fill="#8BC34A"/>
    <circle cx="188" cy="225" r="5" fill="#8BC34A"/>
  </g>
  
  <!-- Area label indicator -->
  <text x="128" y="188" text-anchor="middle" fill="#FFFFFF" font-size="24" font-weight="bold" font-family="sans-serif">A</text>
</svg>
