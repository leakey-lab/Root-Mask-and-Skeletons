<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="axisGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C4DFF" stop-opacity="1" />
      <stop offset="100%" stop-color="#536DFE" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="lineChartGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4CAF50" stop-opacity="1" />
      <stop offset="50%" stop-color="#8BC34A" stop-opacity="1" />
      <stop offset="100%" stop-color="#CDDC39" stop-opacity="1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Chart background -->
  <rect x="40" y="30" width="186" height="180" rx="8" ry="8" 
        fill="#282a36" stroke="#44475a" stroke-width="2"/>
  
  <!-- Grid lines -->
  <g stroke="#44475a" stroke-width="1" opacity="0.5">
    <line x1="40" y1="70" x2="226" y2="70"/>
    <line x1="40" y1="110" x2="226" y2="110"/>
    <line x1="40" y1="150" x2="226" y2="150"/>
    <line x1="80" y1="30" x2="80" y2="210"/>
    <line x1="120" y1="30" x2="120" y2="210"/>
    <line x1="160" y1="30" x2="160" y2="210"/>
    <line x1="200" y1="30" x2="200" y2="210"/>
  </g>
  
  <!-- Chart axes -->
  <g stroke="url(#axisGradient)" stroke-width="3" stroke-linecap="round">
    <!-- Y axis -->
    <line x1="50" y1="40" x2="50" y2="200"/>
    <!-- X axis -->
    <line x1="50" y1="200" x2="220" y2="200"/>
  </g>
  
  <!-- LINE CHART - the distinguishing feature -->
  <g filter="url(#glow)">
    <!-- Line chart path -->
    <polyline points="55,170 85,140 115,155 145,95 175,110 205,60" 
              fill="none" stroke="url(#lineChartGradient)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Data points on line -->
    <circle cx="55" cy="170" r="6" fill="#4CAF50" stroke="#fff" stroke-width="2"/>
    <circle cx="85" cy="140" r="6" fill="#66BB6A" stroke="#fff" stroke-width="2"/>
    <circle cx="115" cy="155" r="6" fill="#81C784" stroke="#fff" stroke-width="2"/>
    <circle cx="145" cy="95" r="6" fill="#8BC34A" stroke="#fff" stroke-width="2"/>
    <circle cx="175" cy="110" r="6" fill="#AED581" stroke="#fff" stroke-width="2"/>
    <circle cx="205" cy="60" r="6" fill="#CDDC39" stroke="#fff" stroke-width="2"/>
  </g>
  
  <!-- Trend arrow -->
  <g opacity="0.6">
    <line x1="60" y1="185" x2="200" y2="75" stroke="#4CAF50" stroke-width="2" stroke-dasharray="5,3"/>
    <polygon points="200,75 188,82 192,92" fill="#4CAF50"/>
  </g>
  
  <!-- Y-axis label hint for "Length" -->
  <text x="35" y="125" fill="#bd93f9" font-size="14" font-weight="bold" font-family="sans-serif" transform="rotate(-90, 35, 125)">L</text>
</svg>
