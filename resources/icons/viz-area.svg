<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="axisGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7C4DFF" stop-opacity="1" />
      <stop offset="100%" stop-color="#536DFE" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="barGradient1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#4CAF50" stop-opacity="1" />
      <stop offset="100%" stop-color="#81C784" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="barGradient2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#66BB6A" stop-opacity="1" />
      <stop offset="100%" stop-color="#A5D6A7" stop-opacity="1" />
    </linearGradient>
    <linearGradient id="barGradient3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#8BC34A" stop-opacity="1" />
      <stop offset="100%" stop-color="#C5E1A5" stop-opacity="1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Chart background -->
  <rect x="40" y="30" width="186" height="180" rx="8" ry="8" 
        fill="#282a36" stroke="#44475a" stroke-width="2"/>
  
  <!-- Grid lines -->
  <g stroke="#44475a" stroke-width="1" opacity="0.5">
    <line x1="40" y1="70" x2="226" y2="70"/>
    <line x1="40" y1="110" x2="226" y2="110"/>
    <line x1="40" y1="150" x2="226" y2="150"/>
  </g>
  
  <!-- Chart axes -->
  <g stroke="url(#axisGradient)" stroke-width="3" stroke-linecap="round">
    <!-- Y axis -->
    <line x1="50" y1="40" x2="50" y2="200"/>
    <!-- X axis -->
    <line x1="50" y1="200" x2="220" y2="200"/>
  </g>
  
  <!-- BAR CHART - Filled bars representing AREA -->
  <g filter="url(#glow)">
    <!-- Bar 1 -->
    <rect x="60" y="130" width="28" height="70" rx="3" ry="3"
          fill="url(#barGradient1)" stroke="#2E7D32" stroke-width="1"/>
    
    <!-- Bar 2 -->
    <rect x="98" y="85" width="28" height="115" rx="3" ry="3"
          fill="url(#barGradient2)" stroke="#388E3C" stroke-width="1"/>
    
    <!-- Bar 3 -->
    <rect x="136" y="110" width="28" height="90" rx="3" ry="3"
          fill="url(#barGradient1)" stroke="#2E7D32" stroke-width="1"/>
    
    <!-- Bar 4 -->
    <rect x="174" y="55" width="28" height="145" rx="3" ry="3"
          fill="url(#barGradient3)" stroke="#558B2F" stroke-width="1"/>
  </g>
  
  <!-- Highlight squares on top of bars to emphasize "area" -->
  <g opacity="0.8">
    <rect x="65" y="135" width="18" height="18" fill="none" stroke="#FFFFFF" stroke-width="2" rx="2"/>
    <rect x="103" y="90" width="18" height="18" fill="none" stroke="#FFFFFF" stroke-width="2" rx="2"/>
    <rect x="141" y="115" width="18" height="18" fill="none" stroke="#FFFFFF" stroke-width="2" rx="2"/>
    <rect x="179" y="60" width="18" height="18" fill="none" stroke="#FFFFFF" stroke-width="2" rx="2"/>
  </g>
  
  <!-- Y-axis label hint for "Area" -->
  <text x="35" y="125" fill="#bd93f9" font-size="14" font-weight="bold" font-family="sans-serif" transform="rotate(-90, 35, 125)">A</text>
</svg>
